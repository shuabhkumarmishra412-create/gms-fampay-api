<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GMS FamPay API</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: url('https://files.catbox.moe/ktx8og.png') no-repeat center center fixed;
      background-size: cover;
      color: #0f0;
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.75);
      z-index: -1;
    }
    .container {
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      text-align: center;
      background: rgba(0, 0, 0, 0.7);
      border-radius: 15px;
      border: 1px solid #0f0;
    }
    h1 { color: #00ff00; text-shadow: 0 0 10px #0f0; }
    input, button {
      padding: 12px;
      margin: 8px 0;
      width: 100%;
      border-radius: 5px;
      font-size: 16px;
    }
    input { background: rgba(255,255,255,0.1); color: white; }
    button { background: #0f0; color: black; font-weight: bold; cursor: pointer; }
    button:hover { background: #00cc00; }
    .help-btn { background: #444; color: white; }
    .telegram-btn { background: #229ED9; color: white; }
    pre { background: #222; padding: 15px; overflow: auto; border-radius: 5px; }
  </style>
</head>
<body>
<div class="container">
  <h1>🔥 GMS FamPay API</h1>

  <div id="setup">
    <h2>Setup Your API</h2>
    <input type="email" id="gmail" placeholder="Gmail Address"><br>
    <input type="password" id="appPass" placeholder="Gmail App Password"><br>
    <input type="text" id="upi" placeholder="Your UPI ID"><br>
    <button onclick="createAPI()">Create API Key (Free)</button>
    <button class="help-btn" onclick="showAppPasswordHelp()">How to get Google App Password?</button>
    <button class="telegram-btn" onclick="window.open('https://t.me/+1NRRqUd1replNTM1', '_blank')">Join GMS Network</button>
  </div>

  <div id="dashboard" style="display:none;">
    <h2>✅ API Ready</h2>
    <p><strong>API Key:</strong> <span id="apiKeyDisplay"></span></p>
    <p><strong>UPI:</strong> <span id="upiDisplay"></span></p>

    <h3>Generate QR</h3>
    <input type="number" id="amount" value="10">
    <button onclick="genQR()">Generate QR</button>
    <pre id="qrRes"></pre>

    <h3>Verify Payment</h3>
    <input type="text" id="orderId" placeholder="Order ID">
    <button onclick="verifyPay()">Verify</button>
    <pre id="verifyRes"></pre>
  </div>
</div>

<script>
let currentApiKey = "";

async function createAPI() {
  const gmail = document.getElementById('gmail').value.trim();
  const appPass = document.getElementById('appPass').value.trim();
  const upi = document.getElementById('upi').value.trim();
  if (!gmail || !appPass || !upi) return alert("All fields required");
  
  const res = await fetch('/create-api', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({gmail, appPass, upi})
  });
  const data = await res.json();
  
  if (data.status === "success") {
    currentApiKey = data.apiKey;
    document.getElementById('apiKeyDisplay').textContent = data.apiKey;
    document.getElementById('upiDisplay').textContent = upi;
    document.getElementById('setup').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
  } else {
    alert(data.message);
  }
}

async function genQR() {
  const amount = document.getElementById('amount').value;
  const res = await fetch(`/api/qr?api=${currentApiKey}&amount=${amount}`);
  const data = await res.json();
  document.getElementById('qrRes').textContent = JSON.stringify(data, null, 2);
  if (data.data) document.getElementById('orderId').value = data.data.order_id;
}

async function verifyPay() {
  const orderId = document.getElementById('orderId').value;
  const res = await fetch(`/api/verify?api_key=${currentApiKey}&order_id=${orderId}`);
  const data = await res.json();
  document.getElementById('verifyRes').textContent = JSON.stringify(data, null, 2);
}

function showAppPasswordHelp() {
  alert("🔑 How to Get Google App Password:\n\n1. Go to myaccount.google.com\n2. Search 'App Passwords'\n3. Select Mail → Other\n4. Generate & Copy 16 character password");
}
</script>
</body>
</html>
